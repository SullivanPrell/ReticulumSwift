name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout (with LFS for CI2PD binary)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
